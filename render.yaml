databases:
  - name: expense_code
    databaseName: expense_code
    user: expense_code
    plan: free

services:
  - type: web
    name: expense-code
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    preDeployCommand: "bundle exec rails db:migrate"
    startCommand: "bundle exec rails server"
    healthCheckPath: /up

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense_code
          property: connectionString

      - key: RAILS_MASTER_KEY
        sync: false

      - key: RAILS_ENV
        value: production

      - key: WEB_CONCURRENCY
        value: 2